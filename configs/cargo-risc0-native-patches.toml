[patch.crates-io]
# RISC Zero patched crates route supported crypto operations through zkVM
# precompiles in the RISC0 guest. Use with:
#   cargo --config configs/cargo-risc0-native-patches.toml ...
#
# RISC Zero currently documents sha2 patches for 0.10.8. If Cargo has already
# resolved sha2 to 0.10.9, run:
#   cargo update -p sha2 --precise 0.10.8
sha2 = { git = "https://github.com/risc0/RustCrypto-hashes", tag = "sha2-v0.10.8-risczero.0" }
curve25519-dalek = { git = "https://github.com/risc0/curve25519-dalek", tag = "curve25519-4.1.3-risczero.0" }
